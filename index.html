<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Likes Archive</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="top-bar">
    <div id="top-row">
      <h1>Likes Archive</h1>
      <div id="column-switcher">
        <button class="col-btn active" data-cols="2">2</button>
        <button class="col-btn" data-cols="3">3</button>
        <button class="col-btn" data-cols="4">4</button>
        <button class="col-btn" data-cols="5">5</button>
      </div>
    </div>
    <div id="tab-row">
      <button class="tab active" id="tab-general">General</button>
      <button class="tab" id="tab-boards">Boards</button>
    </div>
    <div id="search-row">
      <input type="text" id="search" placeholder="Search..." />
      <label id="import-btn">
        Import
        <input type="file" id="file-input" accept=".js,.json,.csv" multiple hidden />
      </label>
    </div>
    <div id="like-counter">0 likes</div>
  </div>

  <div id="main-view">

    <div id="general-view">
      <div id="gallery"></div>
    </div>

    <div id="boards-view" class="hidden">
      <div id="boards-list"></div>
      <div id="board-contents" class="hidden">
        <button id="back-btn">← Back</button>
        <div id="board-gallery"></div>
      </div>
    </div>

  </div>

  <div id="lightbox" class="hidden">
    <div id="lightbox-overlay"></div>
    <div id="lightbox-content">
      <button id="lightbox-close">✕</button>
      <div id="lightbox-author"></div>
      <div id="lightbox-text"></div>
      <div id="lightbox-embed"></div>
      <div id="lightbox-actions">
        <a id="lightbox-link" href="" target="_blank">Open tweet</a>
        <button id="lightbox-board-btn">Add to board</button>
        <button id="lightbox-delete">Delete</button>
      </div>
    </div>
  </div>

  <div id="board-picker" class="hidden">
    <div id="board-picker-overlay"></div>
    <div id="board-picker-content">
      <h2>Choose a board</h2>
      <div id="board-picker-list"></div>
      <div id="board-picker-new">
        <input type="text" id="new-board-name" placeholder="New board name..." />
        <button id="new-board-btn">Create</button>
      </div>
      <button id="board-picker-cancel">Cancel</button>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
